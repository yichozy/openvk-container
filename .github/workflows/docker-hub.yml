name: Build and Push openvk-container

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: enzii/openvk-container

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/DockerfileBaseV2
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/openvk-container.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvk-container
          path: /tmp/openvk-container.tar
          retention-days: 1

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: openvk-container
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/openvk-container.tar

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Tag and push Docker image
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            docker tag ${{ env.IMAGE_NAME }}:latest $tag
            docker push $tag
          done
