name: Build and Push openvk-container

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: docker.io
  IMAGE_NAME: enzii/openvk-container
  IMAGE_NAME_GREP: enzii/openvk-grep-sidecar

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Extract Docker metadata for grep-sidecar
        id: meta-grep
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_GREP }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push grep-sidecar image
        uses: docker/build-push-action@v5
        with:
          context: ./grep-sidecar
          file: ./grep-sidecar/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-grep.outputs.tags }}
          labels: ${{ steps.meta-grep.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
