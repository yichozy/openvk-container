services:
  openviking:
    image: enzii/openvk-container:latest
    build: .
    container_name: openviking-container
    ports:
      - "1934:1934"
    environment:
      - PATH=/usr/local/lib/python3.11/site-packages/openviking/bin:$PATH
    volumes:
      # Mount the workspace data directory for persistence
      - ./data:/app/data
      # Mount the user's config file
      - ./.openviking/ov.conf:/app/ov.conf:ro
    restart: unless-stopped
    # If using local GPU/local models, additional configuration like network_mode: "host" might be required.
