apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openviking.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openviking.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openviking.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openviking.labels" . | nindent 8 }}
      annotations:
        checksum/ov-conf: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      containers:
        - name: {{ include "openviking.fullname" . }}
          image: "{{ .Values.openviking.image.repository }}:{{ .Values.openviking.image.tag }}"
          imagePullPolicy: {{ .Values.openviking.image.pullPolicy }}
          env:
            - name: OPENVIKING_CONFIG_FILE
              value: /app/ov.conf
          volumeMounts:
            - name: config
              mountPath: /app/ov.conf
              subPath: ov.conf
              readOnly: true
            - name: data
              mountPath: /app/data
              subPath: data
          {{- with .Values.openviking.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: ov-sidecar
          image: "{{ .Values.sidecar.image.repository }}:{{ .Values.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.sidecar.image.pullPolicy }}
          ports:
            - name: sidecar
              containerPort: {{ .Values.sidecar.port }}
              protocol: TCP
            {{- if eq .Values.role "replica" }}
            - name: rsync
              containerPort: {{ .Values.sidecar.rsyncDaemonPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: SIDECAR_GREP_THREADS
              value: "4"
            - name: SIDECAR_MAX_CONCURRENCY
              value: "6"
            - name: OPEN_VIKING_DATA_PATH
              value: /app/data/workspace/viking
            - name: OPEN_VIKING_ACCOUNT
              value: {{ .Values.sidecar.openVikingAccount | quote }}
            {{- if .Values.sidecar.cacheRedis.existingSecret.name }}
            - name: CACHE_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sidecar.cacheRedis.existingSecret.name | quote }}
                  key: {{ .Values.sidecar.cacheRedis.existingSecret.hostKey | quote }}
            - name: CACHE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sidecar.cacheRedis.existingSecret.name | quote }}
                  key: {{ .Values.sidecar.cacheRedis.existingSecret.passwordKey | quote }}
            {{- else }}
            - name: CACHE_REDIS_HOST
              value: {{ .Values.sidecar.cacheRedis.host | quote }}
            {{- end }}
            - name: CACHE_REDIS_DB
              value: {{ .Values.sidecar.cacheRedis.db | quote }}
            - name: CACHE_GREP_PREFIX
              value: {{ .Values.sidecar.cacheGrep.prefix | quote }}
            - name: CACHE_GREP_TTL
              value: {{ .Values.sidecar.cacheGrep.ttl | quote }}
            {{- if eq .Values.role "primary" }}
            - name: SYNC_SOURCE_DIR
              value: {{ .Values.sync.sourceDir | quote }}
            - name: SYNC_DEST_DIRS
              value: {{ .Values.sync.destDirs | quote }}
            - name: SYNC_INTERVAL
              value: {{ .Values.sync.interval | quote }}
            - name: SYNC_EXCLUDES
              value: {{ .Values.sync.excludes | quote }}
            {{- end }}
            {{- if eq .Values.role "replica" }}
            - name: RSYNC_DAEMON_ENABLED
              value: "true"
            - name: RSYNC_DAEMON_PORT
              value: {{ .Values.sidecar.rsyncDaemonPort | quote }}
            - name: RSYNC_DAEMON_CONFIG_PATH
              value: /etc/rsyncd.conf
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: rsyncd-config
              mountPath: /etc/rsyncd.conf
              subPath: rsyncd.conf
              readOnly: true
          {{- with .Values.sidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.sidecar.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.sidecar.port }}
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: rsyncd-config
          configMap:
            name: {{ include "openviking.fullname" . }}-rsyncd-config
        - name: config
          secret:
            secretName: {{ include "openviking.fullname" . }}-ov-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openviking.fullname" . }}
